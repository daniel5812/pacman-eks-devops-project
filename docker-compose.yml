services:
  mongo:
    image: mongo:3.6
    container_name: pacman-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  pacman-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: pacman-app:local
    container_name: pacman-app
    ports:
      - "8080:8080"
    environment:
      MONGO_SERVICE_HOST: mongo
      MONGO_DATABASE: pacman
      MY_MONGO_PORT: "27017"
    depends_on:
      - mongo

volumes:
  mongo-data: